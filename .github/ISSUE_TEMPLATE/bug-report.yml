name: Bug Report
description: Report a reproducible defect in API, web, Android app, or SDK
title: "[BUG] <short summary>"
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - apps/api
        - apps/web
        - android/app
        - android/iamhuman-sdk
        - scripts/ci-docs
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include deterministic commands where possible.
      placeholder: |
        1. ./scripts/dev-up.sh
        2. ...
        3. Observed error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Deterministic Validation Run
      description: Paste output summary from pre-PR checks.
      placeholder: ./scripts/pre-pr-check.sh --fast (or --ci)
    validations:
      required: true
  - type: checkboxes
    id: security
    attributes:
      label: Security
      options:
        - label: This report does not include sensitive exploit details.
          required: true
